completions:
  # Git branch completion
  - name: git branch
    patterns:
      - "^git (checkout|switch|merge|rebase|branch -d)( -b)? $"
    sourceCommand: "git branch -a --format='%(refname:short)'"
    options:
      --prompt: "'Git Branch> '"
      --preview: "git log --oneline {}"

  # Kill process completion
  - name: kill
    patterns:
      - "^kill( -9)? $"
    sourceCommand: "LANG=C ps -ef | sed 1d"
    options:
      --multi: true
      --prompt: "'Kill Process> '"
    callback: "awk '{print $2}'"

  # Path-like completion for editors and viewers
  - name: file path-like completion
    patterns:
      - "^(bat|nvim|vim|cat|less|head|tail|diff|delta|open|xdg-open|file|wc|stat|chmod)( .*)? (~/|/|\\./|(?:\\.\\./)+).*$"
    sourceCommand: "LBUFFER=\"$LBUFFER\" HOME=\"$HOME\" PWD=\"$PWD\" \"$HOME/.local/bin/zeno-path-completion\" file"
    options:
      --prompt: "'File Path> '"

  - name: directory path-like completion
    patterns:
      - "^(cd|pushd|z|zi|rmdir)( .*)? (~/|/|\\./|(?:\\.\\./)+).*$"
    sourceCommand: "LBUFFER=\"$LBUFFER\" HOME=\"$HOME\" PWD=\"$PWD\" \"$HOME/.local/bin/zeno-path-completion\" dir"
    options:
      --prompt: "'Dir Path> '"

  - name: path-like completion
    patterns:
      - "^(cp|mv|rg|grep|find|fd|ls|tree|eza|la|ll|trash-put)( .*)? (~/|/|\\./|(?:\\.\\./)+).*$"
    sourceCommand: "LBUFFER=\"$LBUFFER\" HOME=\"$HOME\" PWD=\"$PWD\" \"$HOME/.local/bin/zeno-path-completion\" both"
    options:
      --prompt: "'Path> '"

  # File completion for editors and viewers
  - name: file completion
    patterns:
      - "^(bat|nvim|vim|cat|less|head|tail|diff|delta|open|xdg-open|file|wc|stat|chmod).* $"
    sourceCommand: "fd --type f --hidden"
    options:
      --prompt: "'File> '"
      --preview: "bat --color=always --style=numbers --line-range=:500 {}"

  - name: directory completion
    patterns:
      - "^(cd|pushd|z|zi|rmdir).* $"
    sourceCommand: "fd --type d --hidden"
    options:
      --prompt: "'Dir> '"
      --preview: "eza --tree --level=2 --icons --color=always {}"

  - name: path completion
    patterns:
      - "^(cp|mv|rg|grep|find|fd|ls|tree|eza|la|ll|trash-put).* $"
    sourceCommand: "fd --hidden"
    options:
      --prompt: "'Path> '"
      --preview: "bat --color=always --style=numbers --line-range=:500 {} 2>/dev/null || eza --tree --level=2 --icons --color=always {}"
