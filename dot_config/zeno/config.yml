snippets:
  # Git
  - name: git status
    keyword: gs
    snippet: git status

  - name: git add
    keyword: ga
    snippet: git add

  - name: git commit
    keyword: gc
    snippet: git commit -m '{{commit_message}}'

  - name: git push
    keyword: gp
    snippet: git push

  - name: git pull
    keyword: gl
    snippet: git pull

  - name: git diff
    keyword: gd
    snippet: git diff

  - name: git log
    keyword: glo
    snippet: git log --oneline

  # Docker
  - name: docker compose up
    keyword: dcu
    snippet: docker compose up -d

  - name: docker compose down
    keyword: dcd
    snippet: docker compose down

  - name: docker ps
    keyword: dps
    snippet: docker ps

  # Tmux
  - name: tmux
    keyword: t
    snippet: tmux

  - name: tmux attach
    keyword: ta
    snippet: tmux a

  - name: tmux new session
    keyword: tn
    snippet: tmux new -A -s $(whoami)

  # Utils
  - name: mkdir with parents
    keyword: mkdir
    snippet: mkdir -p

  - name: clear
    keyword: c
    snippet: clear

  - name: exit
    keyword: e
    snippet: exit

  - name: rm (safe delete)
    keyword: rm
    snippet: trash-put

  - name: nvim
    keyword: v
    snippet: nvim

  # eza (ls replacement)
  - name: ls
    keyword: ls
    snippet: eza --icons --group-directories-first

  - name: ls long
    keyword: l
    snippet: eza --icons --group-directories-first -l --header --git --group

  - name: ls all
    keyword: la
    snippet: eza --icons --group-directories-first -a

  - name: ls tree
    keyword: lt
    snippet: eza --icons --group-directories-first --tree

  - name: ls long all
    keyword: lla
    snippet: eza --icons --group-directories-first -la --header --git --group

  # bat
  - name: bat
    keyword: b
    snippet: bat --theme ansi

completions:
  # Git branch completion
  - name: git branch
    patterns:
      - "^git (checkout|switch|merge|rebase|branch -d)( -b)? $"
    sourceCommand: "git branch -a --format='%(refname:short)'"
    options:
      --prompt: "'Git Branch> '"
      --preview: "git log --oneline {}"

  # Kill process completion
  - name: kill
    patterns:
      - "^kill( -9)? $"
    sourceCommand: "LANG=C ps -ef | sed 1d"
    options:
      --multi: true
      --prompt: "'Kill Process> '"
    callback: "awk '{print $2}'"

  # File completion for editors and viewers
  - name: file completion
    patterns:
      - "^(bat|nvim|vim|cat|less|head|tail|diff|delta|cp|mv|open|xdg-open|file|wc|stat|chmod|rg|grep).* $"
    sourceCommand: "fd --type f --hidden"
    options:
      --prompt: "'File> '"
      --preview: "bat --color=always --style=numbers --line-range=:500 {}"
