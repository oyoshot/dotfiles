    snippet: cd $(chezmoi source-path)

completions:
  - name: git branch
    match:
      type: command_set
      commands:
        - git checkout
        - git switch
        - git merge
        - git rebase
        - git branch -d
      suffixes:
        - ""
        - " -b"
      require_trailing_space: true
    command: "git branch -a --format='%(refname:short)' | fzf --prompt 'Git Branch> ' --preview 'git log --oneline {}'"

  - name: kill
    match:
      type: command_set
      commands:
        - kill
      suffixes:
        - ""
        - " -9"
      require_trailing_space: true
    command: "LANG=C ps -ef | sed 1d | fzf --multi --prompt 'Kill Process> ' | awk '{print $2}'"

  - name: file path-like completion
    match:
      type: path_like
      mode: file
      commands:
        - bat
        - nvim
        - vim
        - cat
        - less
        - head
        - tail
        - diff
        - delta
        - open
        - xdg-open
        - file
        - wc
        - stat
        - chmod
    command: 'LBUFFER="$LBUFFER" HOME="$HOME" PWD="$PWD" "$HOME/.local/bin/zeno-path-completion" source file | fzf --prompt ''File Path> '' --preview ''HOME="$HOME" PWD="$PWD" "$HOME/.local/bin/zeno-path-completion" preview file {}'' | LBUFFER="$LBUFFER" HOME="$HOME" PWD="$PWD" "$HOME/.local/bin/zeno-path-completion" callback file'

  - name: directory path-like completion
    match:
      type: path_like
      mode: dir
      commands:
        - cd
        - pushd
        - z
        - zi
        - rmdir
    command: 'LBUFFER="$LBUFFER" HOME="$HOME" PWD="$PWD" "$HOME/.local/bin/zeno-path-completion" source dir | fzf --prompt ''Dir Path> '' --preview ''HOME="$HOME" PWD="$PWD" "$HOME/.local/bin/zeno-path-completion" preview dir {}'' | LBUFFER="$LBUFFER" HOME="$HOME" PWD="$PWD" "$HOME/.local/bin/zeno-path-completion" callback dir'

  - name: path-like completion
    match:
      type: path_like
      mode: any
      commands:
        - cp
        - mv
        - rg
        - grep
        - find
        - fd
        - ls
        - tree
        - eza
        - la
        - ll
        - trash-put
    command: 'LBUFFER="$LBUFFER" HOME="$HOME" PWD="$PWD" "$HOME/.local/bin/zeno-path-completion" source both | fzf --prompt ''Path> '' --preview ''HOME="$HOME" PWD="$PWD" "$HOME/.local/bin/zeno-path-completion" preview both {}'' | LBUFFER="$LBUFFER" HOME="$HOME" PWD="$PWD" "$HOME/.local/bin/zeno-path-completion" callback both'

  - name: file completion
    match:
      type: command_prefix_space
      commands:
        - bat
        - nvim
        - vim
        - cat
        - less
        - head
        - tail
        - diff
        - delta
        - open
        - xdg-open
        - file
        - wc
        - stat
        - chmod
    command: "fd --type f --hidden | fzf --prompt 'File> ' --preview 'bat --color=always --style=numbers --line-range=:500 {}'"

  - name: directory completion
    match:
      type: command_prefix_space
      commands:
        - cd
        - pushd
        - z
        - zi
        - rmdir
    command: "fd --type d --hidden | fzf --prompt 'Dir> ' --preview 'eza --tree --level=2 --icons --color=always {}'"

  - name: path completion
    match:
      type: command_prefix_space
      commands:
        - cp
        - mv
        - rg
        - grep
        - find
        - fd
        - ls
        - tree
        - eza
        - la
        - ll
        - trash-put
    command: "fd --hidden | fzf --prompt 'Path> ' --preview 'bat --color=always --style=numbers --line-range=:500 {} 2>/dev/null || eza --tree --level=2 --icons --color=always {}'"
