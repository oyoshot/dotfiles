name: Arch Linux
on: pull_request

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Cache yay
        uses: actions/cache@v3
        with:
          key: arch-yay-${{ hashFiles('dot_config/yay/extra-packages') }}
          restore-keys: arch-yay-
          path: |
            ~/.cache/yay

      - name: Cache mise
        uses: actions/cache@v3
        with:
          key: arch-mise-${{ hashFiles('dot_config/mise/config.toml') }}
          restore-keys: arch-mise-
          path: |
            ~/.cache/mise
            ~/.local/share/mise

      - name: Create image tag
        id: image_tag
        run: |
          VARIANT="$(TZ=UTC-9 date +%Y%m%d)_${IMAGE_HASH:0:7}"
          IMAGE_NAME="onlymyarch"
          TAG="${IMAGE_NAME}:${VARIANT}"
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_OUTPUT

      - name: Build arch image
        run: |
          docker build -t ${{ steps.image_tag.outputs.TAG }} images/arch

      - name: Prepare host cache dirs
        run: |
          mkdir -p $HOME/.cache/{mise,yay,chezmoi}
          mkdir -p $HOME/.local/share/mise

      - name: Run arch container
        shell: bash
        run: |
          sudo chown -R 1000:1000 ${{ github.workspace }}
          IMAGE=${{ steps.image_tag.outputs.TAG }}
          docker run --rm -t \
            -v ${{ env.HOME }}/.cache:/home/user/.cache \
            -v ${{ env.HOME }}/.local/share/mise:/home/user/.local/share/mise \
            -v ${{ github.workspace }}:/home/user \
            -w /home/user \
            "$IMAGE" \
            zsh -c "$(curl -fsSL chezmoi.io/get)" -- init --apply -S .
